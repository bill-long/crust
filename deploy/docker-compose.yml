# Crust - Self-hosted Matrix web client
#
# Usage on the host (e.g. /home/bill/crust/):
#   1. Place this file and a config.json next to it.
#   2. `docker compose pull && docker compose up -d`
#   3. Front it with the host's reverse proxy (see nginx-location.conf.example).
#
# Update flow:
#   docker compose pull && docker compose up -d && docker image prune -f

services:
  crust:
    image: ghcr.io/bill-long/crust:latest
    container_name: crust
    restart: unless-stopped
    volumes:
      - ./config.json:/usr/share/nginx/html/config.json:ro
    ports:
      # Bind to loopback only; TLS terminated by the host's nginx,
      # which proxies /crust/ -> 127.0.0.1:8083/. Container port is 8080:
      # the image runs nginx-unprivileged (non-root), which can't bind 80.
      - "127.0.0.1:8083:8080"

  # Optional push gateway for background Web Push notifications.
  # Only started when the "push" profile is enabled, e.g.
  #   docker compose --profile push up -d
  # Requires ./sygnal.yaml and ./vapid/private_key.pem on the host
  # (see deploy/README.md "Background push notifications").
  sygnal:
    image: matrixdotorg/sygnal:latest
    container_name: sygnal
    restart: unless-stopped
    profiles: ["push"]
    environment:
      SYGNAL_CONF: /sygnal.yaml
    volumes:
      - ./sygnal.yaml:/sygnal.yaml:ro
      - ./vapid:/vapid:ro
    ports:
      # Loopback only; the host's nginx proxies
      # /_matrix/push/ -> 127.0.0.1:8084/_matrix/push/.
      - "127.0.0.1:8084:5000"
    # The upstream image's built-in healthcheck calls `curl`, which is not
    # installed in the image, so the container always reports "unhealthy"
    # despite working. Override it to probe /health with python3 (present in
    # the image). Use 127.0.0.1 (not localhost) to match Sygnal's IPv4 bind
    # (0.0.0.0) and avoid an IPv6 (::1) resolution mismatch.
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
