server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Strict Content Security Policy
    # style-src 'unsafe-inline' required for Kobalte/Solid positioning styles
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https:; media-src 'self' blob:; connect-src 'self' https: wss:; frame-src https:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow camera/mic (needed for Element Call iframe); block geolocation
    add_header Permissions-Policy "camera=*, microphone=*, geolocation=()" always;

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    # Using expires (not add_header) to avoid overriding parent security headers
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg|wasm)$ {
        expires 1y;
    }

    # Never cache the shell or runtime config
    location = /index.html {
        expires -1;
    }

    location = /config.json {
        expires -1;
    }
}
