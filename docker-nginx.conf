server {
    # 8080, not 80: the runtime image is nginx-unprivileged (non-root), which
    # cannot bind ports below 1024. Keep in sync with EXPOSE/HEALTHCHECK in
    # the Dockerfile and the port mappings in deploy/docker-compose.yml.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Strict Content Security Policy. This is a copy of the baseline CSP in
    # index.html (the single source of truth - the rationale for each source
    # is documented there); scripts/check-csp-sync.mjs fails the build if the
    # two drift apart. Kept as a header as well as the meta tag so responses
    # other than index.html are covered too.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https:; media-src 'self' blob: https:; connect-src 'self' https: wss: ipc: http://ipc.localhost; frame-src https:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
        always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow camera/mic (needed for Element Call iframe); block geolocation
    add_header Permissions-Policy "camera=*, microphone=*, geolocation=()" always;

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    # Using expires (not add_header) to avoid overriding parent security headers
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg|wasm)$ {
        expires 1y;
    }

    # Never cache the shell or runtime config
    location = /index.html {
        expires -1;
    }

    location = /config.json {
        expires -1;
    }

    # Never cache the service worker or its registration shim, so new
    # deploys are picked up promptly (exact-match locations take precedence
    # over the hashed-asset rule above).
    location = /sw.js {
        expires -1;
    }

    location = /registerSW.js {
        expires -1;
    }
}
