name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

  browser-tests:
    # Gate on the cheap checks (lint/typecheck/unit/build) so an already-failing
    # run doesn't spend minutes provisioning Chromium + system deps. Tradeoff:
    # when `ci` fails, browser-tests is skipped, so a browser regression only
    # surfaces once `ci` is green - acceptable given how expensive this job is.
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The `browser` vitest project drives a real headless Chromium via
      # Playwright, so its browser (and system deps) must be installed first.
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:browser

  # Publish the GHCR image only AFTER the tests pass (#306): `needs` the test
  # jobs so a red run never ships. Kept in the CI workflow (rather than a
  # separate publish workflow gated via `workflow_run`) so publishing runs in
  # the push context, which avoids fork-PR exposure (PRs never satisfy the `if`)
  # and sha-tag drift. A CI-passed push builds its own per-commit `sha-*` image
  # (unless it is superseded first - see the concurrency note below); `:latest`
  # tracks the default branch.
  #
  publish:
    needs: [ci, browser-tests]
    # Serialize per ref and let a newer branch publish cancel an older one, so
    # in the common case :latest ends at the newest commit; tag publishes are
    # never cancelled (we want every release image). Accepted limitation: since
    # publishing is gated on variable-duration CI, if two near-simultaneous main
    # merges have their CI finish in inverted order this can't fully guarantee
    # ordering (the later-finishing older commit's publish would win) - a rare,
    # self-healing staleness. A stricter "is this still main's head?" guard was
    # considered and rejected: it can suppress a good commit's image entirely
    # when a newer one fails CI, a worse failure mode.
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: ${{ github.ref_type == 'branch' }}
    # Only trusted refs: a push to main (post-merge), a v* tag, or a manual
    # dispatch from main / a v* tag. pull_request events (incl. forks) never
    # match (a PR ref is never main/tag), so unreviewed code can't publish.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed for cache-from/to: type=gha (GHA cache API).
      actions: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_BASE_PATH=/crust/
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
