name: Desktop release

# Builds the Tauri desktop shell (Windows) and, on a `desktop-v*` tag, publishes
# the installers (.msi + NSIS .exe) to a draft GitHub Release. A manual
# `workflow_dispatch` run builds the same artifacts and uploads them as workflow
# artifacts (no release) so the pipeline can be exercised without cutting a tag.
#
# Least privilege: the `build` job runs all third-party install/build steps with
# a READ-ONLY token and uploads the installers as an artifact. The separate
# `release` job (tag pushes only) runs no untrusted code — it just downloads the
# artifact and creates the draft release with a write-scoped token. This keeps
# the write-capable token away from dependency/build scripts.
#
# Tag scheme: desktop releases use `desktop-v*` tags, kept separate from the
# `v*` tags publish.yml uses for the web container, so the two never
# cross-trigger. The installers produced here are UNSIGNED (code signing and
# auto-update are added in later Phase 3 steps).

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

# Default to read-only; the release job opts into contents: write explicitly.
permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      # A desktop-vX.Y.Z tag must match the version in tauri.conf.json so the
      # git tag and the bundled installer names can never disagree. The tag is
      # passed via env (never spliced into the script body) to avoid injection.
      - name: Verify tag matches tauri.conf.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $conf = Get-Content desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $confVersion = $conf.version
          $tagVersion = $env:TAG -replace '^desktop-v', ''
          if ($confVersion -ne $tagVersion) {
            Write-Error "Tag version '$tagVersion' does not match tauri.conf.json version '$confVersion'."
            exit 1
          }
          Write-Host "Version OK: $confVersion"

      # Build the web app first: the shell bundles dist/ via frontendDist
      # (../../dist). Default base path "/" (not the web container's /crust/).
      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      # The Tauri project (desktop/) is a separate pnpm package; install its
      # @tauri-apps/cli so tauri-action can run `pnpm tauri build`.
      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Build only (no tagName) — publishing is the separate, write-scoped job.
      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: crust-desktop-installers
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  release:
    # Only tag pushes publish a release. This job runs no untrusted build code,
    # so it can safely hold the write-scoped token.
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          name: crust-desktop-installers
          path: installers

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          assets=(installers/msi/*.msi installers/nsis/*-setup.exe)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets with --clobber."
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
          else
            echo "Creating draft release $TAG."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Crust Desktop $TAG" \
              --notes "Automated desktop build. Installers are currently UNSIGNED; code signing and auto-update arrive in later Phase 3 steps." \
              "${assets[@]}"
          fi
