name: Publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Needed for cache-from/to: type=gha (GHA cache API).
  actions: write

# Serialize publishes per ref so an older run can't overwrite latest/main after
# a newer one has finished. Don't cancel in-flight publishes for tags (we want
# them all), only for branch pushes.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  publish:
    # Guard against workflow_dispatch from a feature branch publishing unreviewed
    # code. Only publish from main or v* tags regardless of trigger.
    if: >-
      github.event_name != 'workflow_dispatch'
      || github.ref == 'refs/heads/main'
      || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_BASE_PATH=/crust/
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
