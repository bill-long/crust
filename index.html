<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- Baseline Content-Security-Policy - the single source of truth
		     (issue #314). scripts/check-csp-sync.mjs (run by `pnpm build` and
		     the unit suite) keeps the copies in docker-nginx.conf and
		     desktop/src-tauri/tauri.conf.json from drifting.
		     - style-src 'unsafe-inline': Kobalte/Solid positioning styles.
		     - script-src 'wasm-unsafe-eval': matrix-sdk-crypto-wasm
		       (matrix-js-sdk's initRustCrypto) must instantiate the crypto
		       WebAssembly module; without it E2EE init fails.
		     - media-src https:: the click-to-load inline video player streams
		       direct media links (e.g. CDN .mp4 URLs) from their origin,
		       matching how img-src already permits remote https images.
		     - connect-src ipc: http://ipc.localhost: Tauri IPC. Required in
		       the baseline: the desktop shell serves this same built
		       index.html and enforces this meta policy alongside its own
		       header CSP (browsers apply the intersection), so omitting them
		       would break desktop IPC. On the web they add nothing
		       meaningful: ipc: is not a fetchable scheme in browsers, and
		       http://ipc.localhost is loopback-only while connect-src
		       already allows any https: origin.
		     In dev, vite.config.ts appends DEV_EXTRA_SOURCES (see
		     scripts/csp-lib.mjs: the HMR websocket plus http loopback dev
		     endpoints), mirroring tauri.conf.json's devCsp. -->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https:; media-src 'self' blob: https:; connect-src 'self' https: wss: ipc: http://ipc.localhost; frame-src https:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
		/>
		<!-- interactive-widget=resizes-content makes the on-screen keyboard
		     shrink the layout viewport (and thus 100dvh) instead of overlaying
		     content, so the bottom composer stays above the keyboard on mobile
		     rather than being pushed underneath it. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
		/>
		<!-- Dark theme-color (surface-1) so the installed-app title bar's
		     auto-chosen text color stays readable, including when the window
		     is unfocused. The brand pink is the in-app accent, not the OS
		     title-bar color (white-on-pink dims to unreadable when blurred). -->
		<meta name="theme-color" content="#171717" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<title>Crust</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/index.tsx"></script>
	</body>
</html>
